<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Arise OS - نظام التشغيل المستقبلي للأداء العالي">
    <title>Arise OS | واجهة احترافية</title>
    
    <style>
        /* إعادة ضبط المتصفح لضمان عدم وجود أخطاء في المسافات */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --bg-dark: #020617;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(58, 123, 213, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 210, 255, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.6;
        }

        .glass-card {
            background: var(--glass-bg);
            /* تصحيح توافق المتصفحات لتأثير الـ Blur */
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-circle {
            width: 90px;
            height: 90px;
            background: var(--primary-gradient);
            border-radius: 22px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 35px;
        }

        .cta-button {
            display: inline-block;
            background: var(--primary-gradient);
            color: white;
            padding: 16px 40px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
        }

        .cta-button:hover {
            transform: scale(1.03) translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 210, 255, 0.4);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 40px;
        }

        .feature-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .feature-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <main class="glass-card">
        <div class="logo-circle" aria-hidden="true">A</div>
        <h1>Arise OS</h1>
        <p>نظام التشغيل الذي يعيد تعريف القوة والجمال. تجربة مستخدم ذكية وسريعة مبنية لأجلك.</p>
        
        <a href="#download" class="cta-button">حمل النظام الآن</a>

        <section class="features-grid" aria-label="مميزات النظام">
            <div class="feature-box">🚀 أداء خارق</div>
            <div class="feature-box">🔒 تشفير شامل</div>
            <div class="feature-box">🤖 دعم AI</div>
            <div class="feature-box">🔋 توفير طاقة</div>
        </section>
    </main>

</body>
</html>
